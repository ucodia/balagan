<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalaGAN stream</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
        color: #ddd;
        font: 14px system-ui, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
      }
      canvas {
        max-width: 100vw;
        max-height: 60vh;
        background: #111;
      }
      #status {
        opacity: 0.7;
      }
      #controls {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px 12px;
        align-items: center;
        width: min(520px, 92vw);
      }
      #controls label {
        justify-self: end;
        opacity: 0.8;
      }
      input[type="range"] {
        width: 100%;
      }
      #seedpad {
        grid-column: 1 / -1;
        width: 100%;
        height: 160px;
        background: #161616;
        border: 1px solid #333;
        touch-action: none;
      }
      .row {
        grid-column: 1 / -1;
        display: flex;
        gap: 12px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <canvas id="view" width="1024" height="1024"></canvas>
    <div id="status">connecting…</div>
    <div id="controls">
      <label for="position">position</label>
      <input id="position" type="range" min="0" max="1" step="0.001" value="0" />
      <label for="truncation">truncation</label>
      <input id="truncation" type="range" min="0" max="1" step="0.001" value="0.7" />
      <canvas id="seedpad" title="drag to set seedX / seedY"></canvas>
      <label for="speedX">seed speed X</label>
      <input id="speedX" type="range" min="-2" max="2" step="0.01" value="0.25" />
      <label for="speedY">seed speed Y</label>
      <input id="speedY" type="range" min="-2" max="2" step="0.01" value="0" />
      <div class="row">
        <label style="justify-self: start"><input id="anim" type="checkbox" /> animate seed</label>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
